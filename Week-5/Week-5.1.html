<!DOCTYPE html>
<head>
    <style>
        body {
        font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        justify-content: center;
        align-items: center;
        display: flex;
        flex-wrap: wrap;
        }
        .card-container{
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            gap: 20px;
            justify-content: center;

        }
        .card-img{
            padding: 5px;

        }
        .card-button{
            background-color:#6699ff;
            color: black;
            padding: 2px;
        }
        .card-button:hover{
            background-color: #80aaff;
            color: black;
        }
    </style>
</head>
<body>
    <div>
     <div class="card-container">
        <img src="Amaravati.jpg" alt="Amrita" width="200" height="100" class="card-img">

        </button>
     </div>

        </button>
