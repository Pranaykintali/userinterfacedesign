<!DOCTYPE html>
<html>
<head>
  <title>Indian Freedom Fighters</title>
  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      text-align: center;
    }
    h1 {
      background: #3fd9a5;
      padding: 20px;
      color: white;
    }
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 30px;
    }
    .card {
      background: white;
      color: black;
      width: 260px;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px gray;
    }
    .hero-img {
      width: 150px;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
    }
    button {
      padding: 8px 16px;
      border: none;
      background: #3fd9a5;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: black;
    }
  </style>
</head>
<body>
  <h1>Indian Freedom Fighters</h1>

  <div class="container">
    <div class="card">
      <img class="hero-img" src="bhagat.webp" alt="Bhagat Singh">
      <h3>Bhagat Singh</h3>
      <p>Revolutionary Leader</p>
      <button>Know More</button>
    </div>

    <div class="card">
      <img class="hero-img" src="Subhash.webp" alt="Subhas Chandra Bose">
      <h3>Subhas Chandra Bose</h3>
      <p>Netaji</p>
      <button>Know More</button>
    </div>

    <div class="card">
      <img class="hero-img" src="sardar.webp" alt="Sardar Vallabhbhai Patel">
      <h3>Sardar Vallabhbhai Patel</h3>
      <p>Iron Man of India</p>
      <button>Know More</button>
    </div>
  </div>
</body>
</html>
