<!DOCTYPE html>
<html>
<head>
    <title>Laptops</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card-img {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .price {
            font-size: 20px;
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img class="card-img" src="game.webp" alt="Gaming Laptop">
            <h2>GAMING PRO</h2>
            <p>RTX 4080 gaming laptop</p>
            <p class="price">$999.99</p>
        </div>
        <div class="card">
            <img class="card-img" src="ultrabook.webp" alt="Ultrabook">
            <h2>ULTRABOOK</h2>
            <p>Lightweight productivity laptop</p>
            <p class="price">$799.99</p>
        </div>
        <div class="card">
            <img class="card-img" src="creator.webp" alt="Creator Laptop">
            <h2>CREATOR STUDIO</h2>
            <p>4K video editing laptop</p>
            <p class="price">$1299.99</p>
        </div>
        <div class="card">
            <img class="card-img" src="business.webp" alt="Business Laptop">
            <h2>BUSINESS ELITE</h2>
            <p>Enterprise grade laptop</p>
            <p class="price">$899.99</p>
        </div>
    </div>
</body>
</html>
