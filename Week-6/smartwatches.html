<!DOCTYPE html>
<html>
<head>
    <title>Smart Watches</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
            text-align: center;
        }
        .card-img {
            width: 200px;
            height: 200px;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .price {
            font-size: 20px;
            color: #4CAF50;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img class="card-img" src="s9.webp" alt="Premium Smartwatch">
            <h2>PREMIUM S9</h2>
            <p>Advanced health tracking watch</p>
            <p class="price">$199.99</p>
        </div>
        <div class="card">
            <img class="card-img" src="fit.webp" alt="Fitness Tracker">
            <h2>FIT TRACKER</h2>
            <p>24/7 fitness monitoring</p>
            <p class="price">$129.99</p>
        </div>
        <div class="card">
            <img class="card-img" src="sports.webp" alt="Sports Watch">
            <h2>SPORTS PRO</h2>
            <p>GPS running and cycling watch</p>
            <p class="price">$249.99</p>
        </div>
        <div class="card">
            <img class="card-img" src="watch.webp" alt="Classic Smartwatch">
            <h2>CLASSIC SERIES</h2>
            <p>Traditional smartwatch design</p>
            <p class="price">$179.99</p>
        </div>
    </div>
</body>
</html>
