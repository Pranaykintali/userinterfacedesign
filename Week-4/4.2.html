<!DOCTYPE html>
<html>
    UID-CSE25209
<head>
    <title>Two Forms Using Iframes</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            text-align: center;
        }

        h2 {
            margin-top: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 30px;
        }

        iframe {
            width: 350px;
            height: 400px;
            border: 2px solid #555;
            background-color: #fff;
        }
    </style>
</head>
<body>

    <h2>Two Forms Displayed Using Iframes</h2>

    <div class="container">
        <iframe src="login.html" name="loginFrame"></iframe>
        <iframe src="register.html" name="registerFrame"></iframe>
    </div>

</body>
</html>
