<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
</head>
<body style="background-color: antiquewhite; font-family: Arial; text-align: center;">

    <div class="box">
        <h3>User Login</h3>

        <form >
           <table style="text-align: center;" align="center" cellpadding="10" cellspacing="0" border="1"> 
            <tr>
                <td>Username:</td>
                <td><input type="text" name="username"></td>
            </tr>
            <tr></tr>
                <td>Password:</td>
                <td><input type="password" name="password"></td>
            </tr>
            <tr>
                <td colspan="2" align="center"><button type="submit">Login</button></td>
            </tr>
        </table>
        </form>
    </div>

</body>
</html>
