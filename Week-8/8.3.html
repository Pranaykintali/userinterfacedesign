<!DOCTYPE html>

<style>
div {
  width: 100px;
  height: 100px;
  background: whitesmoke;
  border-radius: 50%;
  position: relative;
  animation: mymove 5s infinite linear;
}

@keyframes mymove {
  from {
    left: 0px;
    transform: rotate(0deg);
  }
  to {
    left: 200px;
    transform: rotate(360deg);
  }
}
</style>
</head>

<body style="background-color: greenyellow;">
<div></div>
</body>
