<!DOCTYPE html>
<html>
    <head>
        <style>
            body{
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                background: rgb(101, 172, 100);
            }
            .box{
                width:80px;
                height: 80px;
                align-items: center;
                border-radius: 5px;
                background: whitesmoke;
                animation: Box 5s  2s infinite;
        }
        @keyframes Box{
           from {transform: rotate(0deg);}
           to {transform: rotate(360deg);} 
        }
        </style>
    </head>
    <body>
        <div class="box"></div>
    </body>
</html>
